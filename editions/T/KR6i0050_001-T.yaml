body:
  text: 先淨身口意歸命佛法僧敬禮遍照尊十方諸聖眾我今略開演祕密消災法此法世尊說最勝最第一速出離生死疾證大菩提為順眾生界及說除災難增敬降伏法女人懷難月產危難生子及遭疾患者神鬼作禍殃建立曼拏攞塑畫本尊像燈燃四十九供養瑠璃尊晝夜恒照明奉香花菓食五色成幡蓋放水陸眾生日滿四十九加持五色線繫於病人項欲修如是法智者先從師受三昧耶戒發大菩提心得持明灌頂阿闍梨印可然後乃修持山林閑靜處河池及海岸或自居住處塗拭曼拏攞方圓隨本意置二閼伽水安排下七位燒香花燈明飲食塗香等陳設壇四邊懺悔并隨喜勸請發願等回向諸功德相應成悉地順教而修習輪結契印法佛部心密印定慧應內縛雙慧俱申竪觀佛滿虛空誦真言七遍頂上而散印真言曰唵爾曩爾迦娑嚩二合賀引由此加持故諸佛悉雲集光明照行人離障速成就次結蓮華部心印如前契屈定輪入掌慧輪而建立應觀觀自在與蓮華眷屬在諸如來右念真言七遍頂右而散印真言曰唵阿魯力迦娑嚩二合賀引由此加持故菩薩眾雲集行人為同事所求皆滿足次結金剛部心印亦如前屈慧輪入掌定輪而竪建應觀金剛手一切持金剛住在如來右念真言七遍頂左而散印真言曰唵嚩日囉二合地力二合迦娑嚩二合賀引以此加持故金剛眾雲集承佛本悲願衛護修行者三業如金剛堅固無能壞次結被甲印止觀各為拳持輪橫在掌止拳而安心觀拳加五處額兩肩心喉加持頂上散真言曰唵僕入入嚩二合攞帝惹引吽由此印真言加持被甲故諸魔不陵逼速疾獲成就一切佛頂中是印大威德纔結印護身人天皆敬仰一切嶮難處及諸災難時悉皆獲安樂次志心虔懇舒奢摩他輪毘鉢含那持印地念真言加持滿七遍轉此雜染所成淨妙佛土真言曰唵步入欠引由此加持故成本尊淨土有大寶宮殿種種持莊嚴於寶宮殿中想藥師如來菩薩眾圍繞而觀曼拏攞次結迎請印用前佛部心二輪向身招念真言三遍真言曰唵爾曩爾迦翳醯曳二合呬婆誐嚩妬引烏瑟抳二合灑野娑嚩二合賀引由此加持故一切作障者悉皆而遠走恭敬修行者次獻閼伽水時花汎其上寶藥香種子置之於水內捧至頂上獻念真言七遍想浴聖眾足稱所求之願真言曰曩莫入三滿哆沒馱喃唵誐誐曩娑麼娑麼娑縛二合賀引由獻香水故離垢獲清淨當得灌頂地證如來法身次結獻座印五頂開敷花想從印流出蓮華師子座真言曰唵迦麼攞悉孕二合賀娑嚩二合賀引由此真言印本尊并眷屬各受寶蓮華金剛師子座次結普供養大印之儀則諸頂初分交從印中流出種種諸供養燒香花燈明塗香飲食等眾伎樂雲海臺繖寶樓閣寶座等莊嚴勝妙幢幡蓋賢瓶眾香水皆從印流出遍虛空法界供養諸如來菩薩及聖眾真言曰曩莫三滿哆沒馱喃引薩嚩他引欠嗢娜誐帝娑頗二合囉呬𤚥誐誐曩劍娑嚩二合賀引便以三等力真實妙伽陀誠心念三遍一切皆成就以我功德力如來加持力及以法界力普供養而住後結佛大慈護印之軌儀五頂堅固縛勝輪頂竪合印心額喉頂等諸佛自體真言曰唵沒馱引昧怛哩二合嚩日囉二合洛乞叉二合唅由此加持故一切魔障難及惡人相害疾起於慈心次結佛眼印應以三補吒二蓋持光背猶如笑眼形屈二輪各持二光中節文印自身五處佛母常加護念佛眼根本真言曰曩謨引婆誐嚩妬烏瑟抳二合灑野唵嚕嚕娑普二合嚕入嚩二合攞底瑟姹二合悉馱路左儞薩嚩羅他二合娑馱𩕳娑嚩二合賀引由此印真言加持威力故能滿一切願除一切不祥生一切福德滅一切罪障能令諸有情見聞獲安樂次稱揚讚歎本尊之功德歸命滿月界淨妙瑠璃尊法藥救人天因中十二願慈悲弘誓廣願度諸含生我今申讚揚志心頭面禮根本之密印二羽內相叉兩腕稍相去開張三二寸禪智而來去彼大真言曰曩謨引婆去誐嚩帝一佩殺紫野二合虞嚕二吠𠯆􅝩哩也二合鉢羅二合婆囉惹野三怛他引蘖哆引野四􅟓囉喝二合帝五三藐三沒馱引野六怛儞也二合他引七唵八佩殺爾曳二合九佩殺爾曳二合十佩殺紫野二合十一三麼弩蘖二合帝十二􅁥娑嚩二合賀引十三由是本尊故誦真言遍數七遍至百八散印於頂上陳所祈願心對彼本尊前願希垂照矚殄災除橫死次即取數珠盤置雙掌內加持成七遍捧珠安頂上真言曰唵嚩日囉二合虞醯曳二合惹跛三麼曳吽由此真言印加持念珠故從母珠初起一遍捻一珠真言末字畢至母珠却迴不應越母珠驀過越法罪廣教萬八千略之一百八限數既終畢再捧珠加持稱所祈求事志心普迴施是法印呪若善男子善女人等多諸障難一切疾病女人難月產厄願欲轉禍求福并患鬼神病難差者以五色線搓索呪繫病人項及手足腰腹等仍須請七僧建置道場造本尊像寫藥師經六時行道燃七層燈造五色幡四十九尺日轉經四十九遍放水陸生命四十九頭時花菓子殷勤供養呪五色線發願又以印拄於線上更呪四十九遍結四十九結復念此真言加持真言曰曩謨引囉怛曩二合怛囉二合夜耶一那謨金毘羅二和耆囉三彌佉羅四安陀羅五摩尼羅六素藍羅七因達羅婆耶羅八摩休羅九真持羅十照頭羅十一毘伽羅十二那謨引毘舍闍瞿流十三毘𠺕離耶十四鉢囉二合頗囉闍野十五怛姪他十六唵毘舍施毘舍施十七毘舍十八闍娑摩揭帝十九娑嚩二合賀引復讚禮本尊結本尊密印念真言七遍復獻閼伽水如前申供養辨事佛頂印念明句三遍左旋而解界奉送於聖眾如前迎請印二輪向外撥想像虛空中還歸於淨土安居寶宮殿唵爾曩爾迦蘖蹉蘖蹉婆誐嚩妬引烏瑟膩二合灑野娑嚩二合賀引奉送本尊已即結佛慈護三昧耶密契加持印四處復結佛眼印真言印五處結三部心印各本明三遍復結甲護身真言印五處禮佛發大願隨意任經行藥師瑠璃光如來消災除難念誦儀軌一部一行阿闍梨撰東大寺奝然弟子祚壹之所請也而今所刻者靈雲開山淨嚴和尚之挍本所希壽諸梓以布普天九橫宏難一時消四大沈痾剎那除時享保星舍甲寅臘月吉日和州長谷輪下沙門無等謹識
